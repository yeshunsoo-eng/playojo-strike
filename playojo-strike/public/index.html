<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PlayOJO Strike</title>
<style>
    /* ── RESET & BASE ── */
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#111;color:#fff;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden}

    /* ── LOBBY ── */
    #lobby{position:fixed;inset:0;display:flex;flex-direction:row;align-items:stretch;
      background:linear-gradient(160deg,#0a0a14,#1a0e00);z-index:100;overflow:auto}
    #lobby-left{display:flex;flex-direction:column;align-items:center;justify-content:center;
      flex:1;padding:2rem;border-right:1px solid #1e1e1e;min-width:260px}
    #lobby-right{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
      flex:1;padding:2rem 2.5rem;min-width:280px}
    #lobby img{width:150px;margin-bottom:.4rem;filter:drop-shadow(0 0 12px #ff660077)}
    #lobby .sub{font-size:.8rem;color:#ff6600;letter-spacing:6px;margin-bottom:1.4rem;text-transform:uppercase}
    #nameInput{padding:11px 18px;font-size:1rem;border-radius:6px;border:1.5px solid #ff6600;
      background:#1a1a1a;color:#fff;text-align:center;width:220px;margin-bottom:.8rem;outline:none}
    .bot-row{display:flex;align-items:center;gap:9px;margin-bottom:.8rem;
      color:#ff9900;font-size:.82rem;letter-spacing:2px;cursor:pointer}
    .bot-row input{width:16px;height:16px;accent-color:#ff6600;cursor:pointer}
    #joinBtn{padding:12px 36px;font-size:1rem;font-weight:700;border:none;border-radius:6px;
      background:linear-gradient(90deg,#ff6600,#ff9900);color:#fff;cursor:pointer;
      letter-spacing:2px;text-transform:uppercase}
    #joinBtn:disabled{opacity:.45;cursor:not-allowed}

    /* Skin selector */
    #skin-title{font-size:.65rem;color:#888;letter-spacing:3px;text-transform:uppercase;margin-bottom:.6rem;align-self:flex-start}
    #skin-grid{display:flex;gap:9px;margin-bottom:1rem;flex-wrap:wrap;justify-content:center}
    .skin-opt{width:52px;height:52px;border-radius:6px;border:2px solid #2a2a2a;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#111;transition:.15s;gap:3px}
    .skin-opt span.ico{font-size:1.5rem;line-height:1}
    .skin-opt span.lbl{font-size:.45rem;color:#888;letter-spacing:1px;text-transform:uppercase}
    .skin-opt:hover{border-color:#ff9900;transform:scale(1.06)}
    .skin-opt.sel{border-color:#ff6600;box-shadow:0 0 10px #ff660055}

    /* Controls panel */
    #ctrl-title{font-size:.65rem;color:#ff6600;letter-spacing:3px;text-transform:uppercase;
      margin-bottom:.8rem;border-bottom:1px solid #1e1e1e;padding-bottom:.5rem;width:100%}
    .ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem 1.2rem;width:100%}
    .ctrl-row{display:flex;align-items:center;gap:.55rem}
    .ctrl-key{background:#1a1a1a;border:1px solid #3a3a3a;border-radius:3px;padding:2px 7px;
      font-size:.62rem;color:#ffcc44;font-family:monospace;white-space:nowrap;min-width:26px;text-align:center}
    .ctrl-desc{color:#777;font-size:.68rem}

    /* ── HUD ── */
    #hud{position:fixed;inset:0;pointer-events:none;display:none;z-index:10}
    #xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
    #xhair::before,#xhair::after{content:'';position:absolute;background:#00ee77}
    #xhair::before{width:2px;height:14px;left:-1px;top:-7px}
    #xhair::after{width:14px;height:2px;left:-7px;top:-1px}
    #xhair .dot{position:absolute;width:3px;height:3px;background:#00ee77;border-radius:50%;top:-1.5px;left:-1.5px}
    #hitfx{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      color:#ff3333;font-size:1rem;font-weight:900;opacity:0;letter-spacing:2px;pointer-events:none}
    #dmg-flash{position:fixed;inset:0;pointer-events:none;z-index:18;opacity:0;
      background:rgba(200,0,0,0.45);transition:opacity .15s}

    #topbar{position:absolute;top:0;left:50%;transform:translateX(-50%);
      display:flex;flex-direction:column;align-items:center}
    #scorebar{display:flex;align-items:stretch}
    .sb-ojo{background:#b8920a;color:#fff;padding:5px 22px;font-size:1.35rem;font-weight:900;min-width:54px;text-align:center}
    .sb-str{background:#2255aa;color:#fff;padding:5px 22px;font-size:1.35rem;font-weight:900;min-width:54px;text-align:center}
    #timer{background:#111;color:#fff;padding:5px 20px;font-size:1.35rem;font-weight:900;
      letter-spacing:4px;min-width:76px;text-align:center;border-left:1px solid #333;border-right:1px solid #333}
    #roundlabel{background:#0009;padding:3px 18px;font-size:.62rem;letter-spacing:3px;color:#999;text-align:center}
    #teambadge{padding:2px 14px;font-size:.62rem;letter-spacing:3px;text-align:center;background:#0008;color:#ffcc44}

    #bl{position:absolute;bottom:0;left:0;padding:12px 16px;background:linear-gradient(to top,#000c,transparent)}
    #hp-num{font-size:2rem;font-weight:900;color:#fff;line-height:1}
    #hp-bar{width:110px;height:3px;background:#333;margin:4px 0 6px}
    #hp-fill{height:100%;background:#33cc55;transition:.2s}
    #armor-row{font-size:.78rem;color:#999;letter-spacing:1px}

    #br{position:absolute;bottom:0;right:0;padding:12px 18px;
      background:linear-gradient(to top,#000c,transparent);text-align:right}
    #slot-label{font-size:.62rem;color:#888;letter-spacing:3px;text-transform:uppercase;margin-bottom:3px}
    #ammo-row{display:flex;align-items:baseline;justify-content:flex-end;gap:7px}
    #ammo-cur{font-size:2.6rem;font-weight:900;color:#fff;line-height:1}
    #ammo-sep{font-size:1.2rem;color:#444}
    #ammo-res{font-size:1.2rem;font-weight:700;color:#888}
    #wep-name{font-size:.62rem;color:#777;letter-spacing:3px;text-transform:uppercase;margin-top:2px}

    #wepbar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
      display:flex;gap:5px;pointer-events:all}
    .wbtn{padding:4px 12px;border:1px solid #333;background:#111b;color:#666;
      font-size:.68rem;cursor:pointer;letter-spacing:1px;border-radius:2px}
    .wbtn.on{border-color:#c8a000;color:#ffcc44;background:#c8a00018}

    #kfeed{position:absolute;top:10px;right:12px;display:flex;flex-direction:column;
      gap:3px;align-items:flex-end}
    .kfe{background:#0009;padding:3px 9px;font-size:.72rem;display:flex;gap:6px;
      align-items:center;border-left:2px solid #c8a000;animation:kfout 5s forwards}
    @keyframes kfout{0%,60%{opacity:1}100%{opacity:0}}
    .kfk{color:#ffcc44;font-weight:700}.kfv{color:#ccc}.kfwep{color:#666;font-size:.65rem}

    /* ── OVERLAYS ── */
    #lockprompt{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;
      align-items:center;justify-content:center;flex-direction:column;gap:.4rem;z-index:20;
      pointer-events: none; /* FIX: allow clicks through to game */}
    #lockprompt p{color:#ff9900;font-size:1.5rem;font-weight:700;letter-spacing:3px}
    #lockprompt small{color:#aaa;font-size:.75rem}

    #deathscreen{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
      flex-direction:column;background:#0009;z-index:50}
    #deathscreen h2{font-size:2.6rem;color:#ff2222;font-weight:900;letter-spacing:4px}
    #deathscreen p{color:#aaa;margin-top:.3rem;font-size:.9rem}
    #respawn-timer{font-size:1.4rem;color:#ff6600;margin-top:.7rem;font-weight:700;letter-spacing:2px}

    #matchover{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
      flex-direction:column;background:#000c;z-index:60}
    #matchover h2{font-size:2.2rem;font-weight:900;margin-bottom:.7rem}
    #matchover button{margin-top:1.2rem;padding:10px 30px;background:#ff6600;border:none;
      border-radius:6px;color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;letter-spacing:2px}

    #scoreboard{position:fixed;inset:0;background:#000d;display:none;
      align-items:center;justify-content:center;z-index:30}
    #scoreboard.show{display:flex}
    #sb-wrap{width:660px;background:#111;border:1px solid #2a2a2a}
    #sb-head{display:flex;justify-content:space-between;align-items:center;
      background:#181818;padding:9px 16px;border-bottom:1px solid #222}
    #sb-head span:first-child{font-size:.82rem;font-weight:700;letter-spacing:4px;color:#fff}
    #sb-table{width:100%;border-collapse:collapse}
    #sb-table th{background:#0d0d0d;color:#666;padding:6px 14px;font-size:.65rem;
      letter-spacing:3px;text-transform:uppercase;border-bottom:1px solid #1e1e1e}
    #sb-table td{padding:6px 14px;border-bottom:1px solid #191919;font-size:.78rem;color:#bbb}

    canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>

<!-- ── LOBBY ── -->
<div id="lobby">
  <div id="lobby-left">
    <img src="/logo_ojo.png" alt="PlayOJO">
    <div class="sub">PPC Strike — Office</div>
    <input id="nameInput" placeholder="Enter callsign..." maxlength="16" autocomplete="off">
    <div id="skin-title">Choose your skin</div>
    <div id="skin-grid">
      <div class="skin-opt sel" data-skin="0"><span class="ico">🟠</span><span class="lbl">Blaze</span></div>
      <div class="skin-opt" data-skin="1"><span class="ico">🔵</span><span class="lbl">Frost</span></div>
      <div class="skin-opt" data-skin="2"><span class="ico">🟢</span><span class="lbl">Venom</span></div>
      <div class="skin-opt" data-skin="3"><span class="ico">🟣</span><span class="lbl">Phantom</span></div>
      <div class="skin-opt" data-skin="4"><span class="ico">🔴</span><span class="lbl">Inferno</span></div>
      <div class="skin-opt" data-skin="5"><span class="ico">⚪</span><span class="lbl">Ghost</span></div>
    </div>
    <label class="bot-row"><input type="checkbox" id="botsCheck"> INCLUDE BOTS</label>
    <button id="joinBtn">DEPLOY</button>
  </div>
  <div id="lobby-right">
    <div id="ctrl-title">⌨ CONTROLS</div>
    <div class="ctrl-grid">
      <div class="ctrl-row"><span class="ctrl-key">W A S D</span><span class="ctrl-desc">Move</span></div>
      <div class="ctrl-row"><span class="ctrl-key">Mouse</span><span class="ctrl-desc">Aim / Look</span></div>
      <div class="ctrl-row"><span class="ctrl-key">L‑Click</span><span class="ctrl-desc">Shoot</span></div>
      <div class="ctrl-row"><span class="ctrl-key">Space</span><span class="ctrl-desc">Jump</span></div>
      <div class="ctrl-row"><span class="ctrl-key">Tab</span><span class="ctrl-desc">Scoreboard</span></div>
    </div>
  </div>
</div>

<div id="hud">
  <div id="xhair"><div class="dot"></div></div>
  <div id="hitfx">✕ ✕</div>
  <div id="dmg-flash"></div>
  <div id="topbar">
    <div id="scorebar">
      <div class="sb-ojo" id="score-ojo">0</div>
      <div id="timer">0:00</div>
      <div class="sb-str" id="score-str">0</div>
    </div>
    <div id="roundlabel">ROUND <span id="round-num">1</span></div>
    <div id="teambadge">—</div>
  </div>
  <div id="kfeed"></div>
  <div id="bl">
    <div id="hp-num">100</div>
    <div id="hp-bar"><div id="hp-fill"></div></div>
    <div id="armor-row">ARMOR 100</div>
  </div>
  <div id="br">
    <div id="slot-label">PRIMARY</div>
    <div id="ammo-row">
      <span id="ammo-cur">30</span>
      <span id="ammo-sep">|</span>
      <span id="ammo-res">90</span>
    </div>
    <div id="wep-name">PLASMA RIFLE</div>
  </div>
</div>

<div id="lockprompt"><p>🖱 CLICK TO CAPTURE MOUSE</p><small>ESC to release</small></div>
<div id="deathscreen">
  <h2>ELIMINATED</h2>
</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
const SKINS=[
  {col:0xff6600,em:0xff3300,laser:0xff4400,hex:'#ff6600'},
  {col:0x0088ff,em:0x003399,laser:0x44aaff,hex:'#0088ff'},
  {col:0x00cc44,em:0x006622,laser:0x00ff66,hex:'#00cc44'},
  {col:0x9900ff,em:0x440088,laser:0xaa44ff,hex:'#9900ff'},
  {col:0xff2200,em:0x880000,laser:0xff4422,hex:'#ff2200'},
  {col:0xcccccc,em:0x666666,laser:0xffffff,hex:'#cccccc'},
];
let selectedSkin=0;
document.querySelectorAll('.skin-opt').forEach(el=>{
  el.addEventListener('click',()=>{
    document.querySelectorAll('.skin-opt').forEach(e=>e.classList.remove('sel'));
    el.classList.add('sel'); selectedSkin=parseInt(el.dataset.skin);
  });
});

const socket=io();
let myId=null,alive=true,health=100,inGame=false,pointerLocked=false,shooting=false,lastShot=0;
let curWeapon='rifle',scoped=false,remotePlayers={},onGround=true;
const vel={x:0,y:0,z:0};
let pitch=0,yaw=0,sendT=0;
const WRATE={rifle:150,pistol:400,sniper:1200}, NORMAL_FOV=75,SCOPE_FOV=15;
const G=-20,JV=8,WK=7,RN=11,PR=0.35,PH=1.8;

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.shadowMap.enabled=true;
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xddd8cc);
scene.fog=new THREE.Fog(0xddd8cc,18,55);

const cam=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,150);
cam.position.set(0,1.7,0);

// Lighting
scene.add(new THREE.AmbientLight(0xfff8ee,0.9));
const sunLight=new THREE.DirectionalLight(0xfff0cc,0.7);
sunLight.position.set(15,10,35);
scene.add(sunLight);

// ─── MAP BUILDER ───
const COL=[];
function sm(col){ return new THREE.MeshStandardMaterial({color:col}); }
function box(w,h,d,x,y,z,mat){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z); scene.add(m); return m;
}
function addCol(x,y,z,w,h,d){COL.push({minX:x-w/2,maxX:x+w/2,minY:y-h/2,maxY:y+h/2,minZ:z-d/2,maxZ:z+d/2});}

// Floor/Walls
box(80,0.15,80, 0,0,0, sm(0x8a8878));
box(80,0.25,80, 0,8,0, sm(0xf0ede6));
box(80,8,0.25, 0,4,-40, sm(0xf2efe8)); box(80,8,0.25, 0,4,40, sm(0xf2efe8));
box(0.25,8,80, -40,4,0, sm(0xf2efe8)); box(0.25,8,80,40,4,0, sm(0xf2efe8));

// Pillars
const pillarM=sm(0xe8e4dc);
[[-20,-20],[-20,20],[20,-20],[20,20]].forEach(([x,z])=>{
  box(1.1,8,1.1, x,4,z, pillarM);
  addCol(x,4,z, 1.1,8,1.1);
});

// ─── LOGOS & BANNERS ───
const TL=new THREE.TextureLoader();
function createBanner(url,w,h,x,y,z,ry){
  TL.load(url,tex=>{
    tex.encoding=THREE.sRGBEncoding;
    const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h), new THREE.MeshBasicMaterial({map:tex,transparent:true,side:THREE.DoubleSide}));
    m.position.set(x,y,z); m.rotation.y=ry; scene.add(m);
  });
}
createBanner('logo_ojo.png', 8, 4, 0, 4, -39.8, 0); // North wall
createBanner('logo_owl.jpg', 6, 6, 39.8, 4, 0, -Math.PI/2); // East wall
createBanner('logo_owl.jpg', 6, 6, -39.8, 4, 0, Math.PI/2); // West wall

// Players / Laser Logic
function spawnLaser(ox,oy,oz,dx,dy,dz,col){
  const pts=[new THREE.Vector3(0,0,0),new THREE.Vector3(dx*6,dy*6,dz*6)];
  const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:col}));
  line.position.set(ox,oy,oz); scene.add(line);
  setTimeout(()=>scene.remove(line),80);
}

// ─── LOGIC ───
const keys={};
window.addEventListener('keydown',e=>keys[e.code]=true);
window.addEventListener('keyup',e=>keys[e.code]=false);

document.addEventListener('pointerlockchange', () => {
    pointerLocked = (document.pointerLockElement === canvas);
    if (inGame && alive) document.getElementById('lockprompt').style.display = pointerLocked ? 'none' : 'flex';
});

canvas.addEventListener('click', () => { if(inGame) canvas.requestPointerLock(); });

socket.on('joined', data => {
    myId = data.id; inGame = true; alive = true;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('lockprompt').style.display = 'none';
});

function animate(){
  requestAnimationFrame(animate);
  const dt=0.016;
  if(inGame && alive){
    vel.y+=G*dt;
    const fv=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    const rv=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
    const md=new THREE.Vector3();
    if(keys['KeyW'])md.add(fv); if(keys['KeyS'])md.sub(fv);
    if(keys['KeyA'])md.sub(rv); if(keys['KeyD'])md.add(rv);
    if(md.lengthSq()>0)md.normalize();
    vel.x=md.x*WK; vel.z=md.z*WK;
    cam.position.x+=vel.x*dt; cam.position.z+=vel.z*dt; cam.position.y+=vel.y*dt;
    if(cam.position.y<1.7){cam.position.y=1.7; vel.y=0;}
    
    // Mouse look
    document.addEventListener('mousemove',e=>{
      if(!pointerLocked)return;
      yaw-=e.movementX*0.002; pitch-=e.movementY*0.002;
      pitch=Math.max(-1.5,Math.min(1.5,pitch));
    },{once:true});
    cam.rotation.set(pitch,yaw,0,'YXZ');

    socket.emit('move',{x:cam.position.x, y:cam.position.y-1.7, z:cam.position.z, rotY:yaw});
  }
  renderer.render(scene,cam);
}
animate();

document.getElementById('joinBtn').addEventListener('click',()=>{
  socket.emit('join',{name:document.getElementById('nameInput').value, skin:selectedSkin, withBots:document.getElementById('botsCheck').checked});
});
</script>
</body>
</html>
