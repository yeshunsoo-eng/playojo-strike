<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PlayOJO Strike - Fixed</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#111;color:#fff;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden}

    /* ── LOBBY ── */
    #lobby{position:fixed;inset:0;display:flex;flex-direction:row;align-items:stretch;
      background:linear-gradient(160deg,#0a0a14,#1a0e00);z-index:100;overflow:auto}
    #lobby-left{display:flex;flex-direction:column;align-items:center;justify-content:center;
      flex:1;padding:2rem;border-right:1px solid #1e1e1e;min-width:260px}
    #lobby-right{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
      flex:1;padding:2rem 2.5rem;min-width:280px}
    #lobby .logo-placeholder{width:150px;height:60px;background:#ff6600;margin-bottom:1rem;display:flex;align-items:center;justify-content:center;font-weight:900;border-radius:8px}
    #lobby .sub{font-size:.8rem;color:#ff6600;letter-spacing:6px;margin-bottom:1.4rem;text-transform:uppercase}
    #nameInput{padding:11px 18px;font-size:1rem;border-radius:6px;border:1.5px solid #ff6600;
      background:#1a1a1a;color:#fff;text-align:center;width:220px;margin-bottom:.8rem;outline:none}
    .bot-row{display:flex;align-items:center;gap:9px;margin-bottom:.8rem;
      color:#ff9900;font-size:.82rem;letter-spacing:2px;cursor:pointer}
    #joinBtn{padding:12px 36px;font-size:1rem;font-weight:700;border:none;border-radius:6px;
      background:linear-gradient(90deg,#ff6600,#ff9900);color:#fff;cursor:pointer;
      letter-spacing:2px;text-transform:uppercase}

    /* Skin selector */
    #skin-title{font-size:.65rem;color:#888;letter-spacing:3px;text-transform:uppercase;margin-bottom:.6rem;align-self:flex-start}
    #skin-grid{display:flex;gap:9px;margin-bottom:1rem;flex-wrap:wrap;justify-content:center}
    .skin-opt{width:52px;height:52px;border-radius:6px;border:2px solid #2a2a2a;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#111;transition:.15s;gap:3px}
    .skin-opt span.ico{font-size:1.5rem;line-height:1}
    .skin-opt span.lbl{font-size:.45rem;color:#888;letter-spacing:1px;text-transform:uppercase}
    .skin-opt.sel{border-color:#ff6600;box-shadow:0 0 10px #ff660055}

    /* Controls panel */
    .ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem 1.2rem;width:100%}
    .ctrl-key{background:#1a1a1a;border:1px solid #3a3a3a;border-radius:3px;padding:2px 7px;
      font-size:.62rem;color:#ffcc44;font-family:monospace;min-width:26px;text-align:center}
    .ctrl-desc{color:#777;font-size:.68rem}

    /* ── HUD ── */
    #hud{position:fixed;inset:0;pointer-events:none;display:none;z-index:10}
    #xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
    #xhair::before,#xhair::after{content:'';position:absolute;background:#00ee77}
    #xhair::before{width:2px;height:14px;left:-1px;top:-7px}
    #xhair::after{width:14px;height:2px;left:-7px;top:-1px}
    
    #topbar{position:absolute;top:0;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center}
    #scorebar{display:flex;align-items:stretch}
    #timer{background:#111;color:#fff;padding:5px 20px;font-size:1.35rem;font-weight:900;min-width:76px;text-align:center;border:1px solid #333}
    
    #bl{position:absolute;bottom:0;left:0;padding:12px 16px}
    #hp-bar{width:110px;height:4px;background:#333;margin:4px 0}
    #hp-fill{height:100%;background:#33cc55;width:100%}
    
    #br{position:absolute;bottom:0;right:0;padding:12px 18px;text-align:right}
    #ammo-cur{font-size:2.6rem;font-weight:900}

    #lockprompt{position:fixed;inset:0;background:#000b;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:20}
    canvas{display:block;width:100vw;height:100vh}
    
    /* Sniper scope */
    #scope-overlay{position:fixed;inset:0;display:none;z-index:15;pointer-events:none}
    #scope-overlay.on{display:block}
    #scope-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:280px;height:280px;border-radius:50%;border:3px solid #111;box-shadow:0 0 0 9999px rgba(0,0,0,.88)}
</style>
</head>
<body>

<div id="lobby">
  <div id="lobby-left">
    <div class="logo-placeholder">PLAYOJO</div>
    <div class="sub">PPC Strike — Office</div>
    <input id="nameInput" placeholder="Enter callsign..." maxlength="16">
    <div id="skin-title">Choose your skin</div>
    <div id="skin-grid">
      <div class="skin-opt sel" data-skin="0"><span class="ico">🟠</span><span class="lbl">Blaze</span></div>
      <div class="skin-opt" data-skin="1"><span class="ico">🔵</span><span class="lbl">Frost</span></div>
      <div class="skin-opt" data-skin="2"><span class="ico">🟢</span><span class="lbl">Venom</span></div>
    </div>
    <label class="bot-row"><input type="checkbox" id="botsCheck"> INCLUDE BOTS</label>
    <button id="joinBtn">DEPLOY</button>
  </div>
  <div id="lobby-right">
    <div class="ctrl-grid">
        <div class="ctrl-row"><span class="ctrl-key">W A S D</span> <span class="ctrl-desc">Move</span></div>
        <div class="ctrl-row"><span class="ctrl-key">Space</span> <span class="ctrl-desc">Jump</span></div>
        <div class="ctrl-row"><span class="ctrl-key">L-Click</span> <span class="ctrl-desc">Shoot</span></div>
    </div>
  </div>
</div>

<div id="hud">
  <div id="xhair"></div>
  <div id="topbar">
    <div id="scorebar"><div id="timer">5:00</div></div>
  </div>
  <div id="bl">
    <div id="hp-num">100</div>
    <div id="hp-bar"><div id="hp-fill"></div></div>
  </div>
  <div id="br">
    <div id="ammo-row"><span id="ammo-cur">30</span> / <span id="ammo-res">90</span></div>
    <div id="wep-name">PLASMA RIFLE</div>
  </div>
</div>

<div id="lockprompt"><p style="color:orange">CLICK TO CAPTURE MOUSE</p></div>
<div id="scope-overlay"><div id="scope-ring"></div></div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- Note: If no socket server exists, I've added a fallback below -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
// ─── CONFIG & STATE ───────────────────────────
const SKINS=[
  {col:0xff6600, laser:0xff4400, hex:'#ff6600'},
  {col:0x0088ff, laser:0x44aaff, hex:'#0088ff'},
  {col:0x00cc44, laser:0x00ff66, hex:'#00cc44'}
];
let selectedSkin=0;
let inGame=false, alive=true, pointerLocked=false;
let yaw=0, pitch=0;
const vel={x:0,y:0,z:0};
const COL=[];
const PR=0.35, PH=1.8; // Player radius and height

// ─── THREE.JS SETUP ───────────────────────────
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled=true;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xddd8cc);
const cam=new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun=new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(10,20,10);
scene.add(sun);

// Helper function for boxes (Fixing the Material errors)
function box(w,h,d,x,y,z,mat){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.position.set(x,y,z);
  m.castShadow=m.receiveShadow=true;
  scene.add(m);
  return m;
}
function addCol(x,y,z,w,h,d){
  COL.push({minX:x-w/2, maxX:x+w/2, minY:y-h/2, maxY:y+h/2, minZ:z-d/2, maxZ:z+d/2});
}

// ─── MAP BUILDING (Fixed Materials) ───────────
const floorMat = new THREE.MeshStandardMaterial({color:0x808080});
box(80, 0.1, 80, 0, 0, 0, floorMat); // Floor

const wallMat = new THREE.MeshStandardMaterial({color:0xeeeeee});
box(80, 8, 0.5, 0, 4, -40, wallMat); // North Wall
addCol(0,4,-40, 80,8,0.5);

// Add some desks so the room isn't empty
const deskMat = new THREE.MeshStandardMaterial({color:0x664422});
for(let i=0; i<5; i++) {
    box(2, 1, 1, -10 + (i*5), 0.5, -5, deskMat);
    addCol(-10 + (i*5), 0.5, -5, 2, 1, 1);
}

// ─── CONTROLS ─────────────────────────────────
const keys={};
window.addEventListener('keydown', e=>keys[e.code]=true);
window.addEventListener('keyup', e=>keys[e.code]=false);
window.addEventListener('mousemove', e=>{
    if(!pointerLocked) return;
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
});

document.getElementById('c').addEventListener('click', ()=>{
    if(inGame) document.getElementById('c').requestPointerLock();
});
document.addEventListener('pointerlockchange', ()=>{
    pointerLocked = document.pointerLockElement === document.getElementById('c');
    document.getElementById('lockprompt').style.display = (inGame && !pointerLocked) ? 'flex' : 'none';
});

// ─── GAME LOOP ────────────────────────────────
function update(dt) {
    if(!inGame) return;
    
    // Gravity
    vel.y -= 20 * dt;
    
    // Movement
    const speed = keys['ShiftLeft'] ? 12 : 6;
    let mvX = 0, mvZ = 0;
    if(keys['KeyW']) mvZ -= 1;
    if(keys['KeyS']) mvZ += 1;
    if(keys['KeyA']) mvX -= 1;
    if(keys['KeyD']) mvX += 1;
    
    if(mvX !== 0 || mvZ !== 0) {
        const length = Math.sqrt(mvX*mvX + mvZ*mvZ);
        mvX /= length; mvZ /= length;
        vel.x = (mvX * Math.cos(yaw) + mvZ * Math.sin(yaw)) * speed;
        vel.z = (mvZ * Math.cos(yaw) - mvX * Math.sin(yaw)) * speed;
    } else {
        vel.x = 0; vel.z = 0;
    }

    // Collision (Simplified)
    cam.position.x += vel.x * dt;
    cam.position.z += vel.z * dt;
    cam.position.y += vel.y * dt;

    if(cam.position.y < 1.7) {
        cam.position.y = 1.7;
        vel.y = 0;
        if(keys['Space']) vel.y = 8;
    }

    cam.rotation.order = 'YXZ';
    cam.rotation.set(pitch, yaw, 0);
}

function animate() {
    requestAnimationFrame(animate);
    update(0.016);
    renderer.render(scene, cam);
}
animate();

// ─── JOIN LOGIC (Mocked for Solo Play) ────────
document.getElementById('joinBtn').addEventListener('click', ()=>{
    inGame = true;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    cam.position.set(0, 1.7, 10);
    document.getElementById('c').requestPointerLock();
});

// Skin selection UI
document.querySelectorAll('.skin-opt').forEach(el=>{
    el.addEventListener('click', ()=>{
        document.querySelectorAll('.skin-opt').forEach(e=>e.classList.remove('sel'));
        el.classList.add('sel');
        selectedSkin = parseInt(el.dataset.skin);
    });
});
</script>
</body>
</html>
