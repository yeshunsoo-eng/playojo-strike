<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PlayOJO Strike</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#111;color:#fff;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden}
        #lobby{position:fixed;inset:0;display:flex;flex-direction:row;align-items:stretch;background:linear-gradient(160deg,#0a0a14,#1a0e00);z-index:100;overflow:auto}
        #lobby-left{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:2rem;border-right:1px solid #1e1e1e;min-width:260px}
        #lobby-right{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;flex:1;padding:2rem 2.5rem;min-width:280px}
        #nameInput{padding:11px 18px;font-size:1rem;border-radius:6px;border:1.5px solid #ff6600;background:#1a1a1a;color:#fff;text-align:center;width:220px;margin-bottom:.8rem;outline:none}
        #joinBtn{padding:12px 36px;font-size:1rem;font-weight:700;border:none;border-radius:6px;background:linear-gradient(90deg,#ff6600,#ff9900);color:#fff;cursor:pointer;letter-spacing:2px;text-transform:uppercase}
        .skin-opt{width:52px;height:52px;border-radius:6px;border:2px solid #2a2a2a;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#111;margin:2px}
        .skin-opt.sel{border-color:#ff6600}
        #hud{position:fixed;inset:0;pointer-events:none;display:none;z-index:10}
        #xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px}
        #xhair::before{content:'';position:absolute;background:#0f7;width:2px;height:100%;left:9px}
        #xhair::after{content:'';position:absolute;background:#0f7;height:2px;width:100%;top:9px}
        #topbar{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:20px;background:rgba(0,0,0,0.5);padding:10px;border-radius:5px}
        canvas{display:block;width:100vw;height:100vh}
        #lockprompt{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;color:#ff9900;z-index:20}
    </style>
</head>
<body>

<div id="lobby">
    <div id="lobby-left">
        <div style="font-size:2rem; color:#ff6600; font-weight:900; margin-bottom:1rem;">OJO STRIKE</div>
        <input id="nameInput" placeholder="Enter callsign..." maxlength="16">
        <div id="skin-grid" style="display:flex; margin-bottom:1rem;">
            <div class="skin-opt sel" data-skin="0">🟠</div>
            <div class="skin-opt" data-skin="1">🔵</div>
            <div class="skin-opt" data-skin="2">🟢</div>
        </div>
        <label style="color:#aaa; margin-bottom:1rem;"><input type="checkbox" id="botsCheck"> Include Bots</label>
        <button id="joinBtn">DEPLOY</button>
    </div>
    <div id="lobby-right">
        <h3 style="color:#ff6600">CONTROLS</h3>
        <p>W A S D - Move</p>
        <p>Mouse - Aim</p>
        <p>Left Click - Shoot</p>
    </div>
</div>

<div id="hud">
    <div id="xhair"></div>
    <div id="topbar">
        <div id="score-ojo">0</div>
        <div id="timer">2:00</div>
        <div id="score-str">0</div>
    </div>
</div>

<div id="lockprompt"><h1>CLICK TO START</h1></div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
const SKINS=[
    {col:0xff6600,em:0xff3300,laser:0xff4400,hex:'#ff6600'},
    {col:0x0088ff,em:0x003399,laser:0x44aaff,hex:'#0088ff'},
    {col:0x00cc44,em:0x006622,laser:0x00ff66,hex:'#00cc44'}
];
let selectedSkin=0;
const socket=io();

let inGame=false, pointerLocked=false, myId=null;
let yaw=0, pitch=0;
const keys={};
const vel={x:0, y:0, z:0};

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);
const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('c'), antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

// Floor
const floor = new THREE.Mesh(new THREE.PlaneGeometry(100,100), new THREE.MeshStandardMaterial({color:0x444444}));
floor.rotation.x = -Math.PI/2;
scene.add(floor);

document.querySelectorAll('.skin-opt').forEach(el=>{
    el.addEventListener('click',()=>{
        document.querySelectorAll('.skin-opt').forEach(e=>e.classList.remove('sel'));
        el.classList.add('sel'); selectedSkin=parseInt(el.dataset.skin);
    });
});

document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup', e => keys[e.code] = false);

document.addEventListener('mousemove', e => {
    if(pointerLocked) {
        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
        pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
    }
});

document.addEventListener('pointerlockchange', () => {
    pointerLocked = document.pointerLockElement === document.getElementById('c');
    document.getElementById('lockprompt').style.display = pointerLocked ? 'none' : 'flex';
});

document.getElementById('joinBtn').addEventListener('click', () => {
    const name = document.getElementById('nameInput').value || 'Player';
    socket.emit('join', {name, skin: selectedSkin});
});

socket.on('joined', data => {
    myId = data.id;
    inGame = true;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('c').requestPointerLock();
});

function animate() {
    requestAnimationFrame(animate);
    if(inGame) {
        const speed = 0.1;
        if(keys['KeyW']) {
            cam.position.x -= Math.sin(yaw) * speed;
            cam.position.z -= Math.cos(yaw) * speed;
        }
        if(keys['KeyS']) {
            cam.position.x += Math.sin(yaw) * speed;
            cam.position.z += Math.cos(yaw) * speed;
        }
        cam.rotation.order = 'YXZ';
        cam.rotation.y = yaw;
        cam.rotation.x = pitch;

        socket.emit('move', {x: cam.position.x, y: cam.position.y, z: cam.position.z, rotY: yaw});
    }
    renderer.render(scene, cam);
}
animate();
</script>
</body>
</html>
