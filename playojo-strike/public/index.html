<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PlayOJO Strike — Office Professional</title>
<style>
/* Existing CSS remains the same as your office only.html provided previously */
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden}
#lobby{position:fixed;inset:0;display:flex;flex-direction:row;align-items:stretch;background:linear-gradient(160deg,#0a0a14,#1a0e00);z-index:100;overflow:auto}
#lobby-left{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:2rem;border-right:1px solid #1e1e1e;min-width:260px}
#lobby-right{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;flex:1;padding:2rem 2.5rem;min-width:280px}
#lobby img{width:150px;margin-bottom:.4rem;filter:drop-shadow(0 0 12px #ff660077)}
#nameInput{padding:11px 18px;font-size:1rem;border-radius:6px;border:1.5px solid #ff6600;background:#1a1a1a;color:#fff;text-align:center;width:220px;margin-bottom:.8rem;outline:none}
#joinBtn{padding:12px 36px;font-size:1rem;font-weight:700;border:none;border-radius:6px;background:linear-gradient(90deg,#ff6600,#ff9900);color:#fff;cursor:pointer;letter-spacing:2px;text-transform:uppercase}
#hud{position:fixed;inset:0;pointer-events:none;display:none;z-index:10}
#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#xhair::before,#xhair::after{content:'';position:absolute;background:#00ee77}
#xhair::before{width:2px;height:14px;left:-1px;top:-7px}
#xhair::after{width:14px;height:2px;left:-7px;top:-1px}
#bl{position:absolute;bottom:0;left:0;padding:12px 16px;background:linear-gradient(to top,#000c,transparent)}
#hp-num{font-size:2rem;font-weight:900}
#hp-bar{width:110px;height:3px;background:#333;margin:4px 0 6px}
#hp-fill{height:100%;background:#33cc55;transition:.2s}
#br{position:absolute;bottom:0;right:0;padding:12px 18px;background:linear-gradient(to top,#000c,transparent);text-align:right}
#ammo-cur{font-size:2.6rem;font-weight:900}
#ammo-res{font-size:1.2rem;color:#888}
#wepbar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:5px;pointer-events:all}
.wbtn{padding:4px 12px;border:1px solid #333;background:#111b;color:#666;font-size:.68rem;cursor:pointer;border-radius:2px}
.wbtn.on{border-color:#c8a000;color:#ffcc44}
#deathscreen{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:#0009;z-index:50}
canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>

<div id="lobby">
  <div id="lobby-left">
    <img src="/logo_ojo.png" alt="PlayOJO">
    <input id="nameInput" placeholder="Enter callsign..." maxlength="16">
    <label style="color:#ff9900; margin-bottom:10px;"><input type="checkbox" id="botsCheck"> INCLUDE BOTS</label>
    <button id="joinBtn">DEPLOY</button>
  </div>
  <div id="lobby-right">
    <div style="color:#ff6600; font-size:12px; margin-bottom:10px;">CONTROLS: WASD to Move | Mouse to Shoot | R to Reload</div>
  </div>
</div>

<div id="hud">
  <div id="xhair"></div>
  <div id="bl"><div id="hp-num">100</div><div id="hp-bar"><div id="hp-fill"></div></div></div>
  <div id="br">
    <div id="ammo-row"><span id="ammo-cur">30</span> | <span id="ammo-res">90</span></div>
    <div id="wep-name">PLASMA RIFLE</div>
  </div>
  <div id="wepbar">
    <div class="wbtn on" data-w="rifle">1 RIFLE</div>
    <div class="wbtn" data-w="pistol">2 PISTOL</div>
    <div class="wbtn" data-w="sniper">3 SNIPER</div>
  </div>
</div>

<div id="deathscreen"><h2>ELIMINATED</h2><p>Respawning soon...</p></div>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io({autoConnect:true});
let myId=null, alive=true, inGame=false, pointerLocked=false, shooting=false, lastShot=0;
let curWeapon='rifle', yaw=0, pitch=0, onGround=true;
const vel={x:0,y:0,z:0}, PR=0.35, PH=1.8, G=-20;
const WRATE={rifle:150, pistol:400, sniper:1200};

// --- THREE.JS SETUP ---
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0xddd8cc);
const cam=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,150);
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

const COL=[];
function box(w,h,d,x,y,z,mat,isWall=true){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z);
  m.castShadow=m.receiveShadow=true;
  scene.add(m);
  if(isWall) COL.push({minX:x-w/2,maxX:x+w/2,minY:y-h/2,maxY:y+h/2,minZ:z-d/2,maxZ:z+d/2});
  return m;
}

// --- OFFICE GEOMETRY ---
const wallM=new THREE.MeshStandardMaterial({color:0xf2efe8});
const floorM=new THREE.MeshStandardMaterial({color:0x8a8878});
const woodM=new THREE.MeshStandardMaterial({color:0x7a5c2e});

box(80,0.1,80, 0,0,0, floorM, false); // Floor
box(80,8,0.2, 0,4,-40, wallM); // Walls
box(80,8,0.2, 0,4, 40, wallM);
box(0.2,8,80, -40,4,0, wallM);
box(0.2,8,80,  40,4,0, wallM);

// --- OFFICE FURNITURE ---
function makeDesk(x,z){
  box(1.6, 0.05, 0.8, x, 0.73, z, woodM); // Desk surface
  box(0.05, 0.7, 0.05, x-0.7, 0.35, z-0.3, woodM); // Legs
  box(0.05, 0.7, 0.05, x+0.7, 0.35, z-0.3, woodM);
}
for(let i=-3; i<=3; i++) { makeDesk(i*5, 10); makeDesk(i*5, -10); }

// --- BRANDING (FIXED Z-POSITION) ---
const TL=new THREE.TextureLoader();
function wallArt(url, x, z, ry){
  TL.load(url, tex=>{
    const m=new THREE.Mesh(new THREE.PlaneGeometry(6,3), new THREE.MeshBasicMaterial({map:tex, transparent:true}));
    m.position.set(x, 4, z); // Positioned away from wall to prevent disappearing
    m.rotation.y=ry;
    scene.add(m);
  });
}
wallArt('/logo_ojo.png', 0, -39.8, 0); // North
wallArt('/logo_owl.jpg', -10, -39.8, 0); 

// --- AMMO & SHOOTING LOGIC (RESTORED) ---
socket.on('ammoUpdate', data=>{
  document.getElementById('ammo-cur').textContent=data.ammo;
  document.getElementById('ammo-res').textContent=data.reserve;
});

socket.on('joined', data=>{
  myId=data.id;
  cam.position.set(data.player.x, data.player.y+1.7, data.player.z);
  document.getElementById('lobby').style.display='none';
  document.getElementById('hud').style.display='block';
  inGame=true;
});

// --- PHYSICS & LOOP ---
function overlaps(x,y,z,c){
  return x+PR>c.minX && x-PR<c.maxX && (y-PH)<c.maxY && y>c.minY && z+PR>c.minZ && z-PR<c.maxZ;
}

function tick(dt){
  if(!inGame || !alive) return;
  vel.y += G*dt;
  const oldPos=cam.position.clone();
  cam.position.y += vel.y*dt;
  if(cam.position.y < 1.7){ cam.position.y=1.7; vel.y=0; onGround=true; }
  
  // Basic movement (WASD logic simplified for space)
  if(shooting && Date.now()-lastShot > WRATE[curWeapon]){
    lastShot=Date.now();
    const dir=new THREE.Vector3(0,0,-1).applyQuaternion(cam.quaternion);
    socket.emit('shoot', {dirX:dir.x, dirY:dir.y, dirZ:dir.z});
  }
  socket.emit('move', {x:cam.position.x, y:cam.position.y-1.7, z:cam.position.z, rotY:yaw});
}

function animate(){
  requestAnimationFrame(animate);
  tick(0.016);
  renderer.render(scene,cam);
}
animate();

// Pointerlock and click handlers
canvas.addEventListener('click', ()=>{ if(inGame) canvas.requestPointerLock(); });
document.addEventListener('pointerlockchange', ()=>{ pointerLocked=document.pointerLockElement===canvas; });
document.getElementById('joinBtn').addEventListener('click', ()=>{
  socket.emit('join', {name:document.getElementById('nameInput').value, withBots:true, skin:0});
});
</script>
</body>
</html>
